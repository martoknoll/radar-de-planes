<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Sonda: la ciudad da señales. Descubrí planes, eventos y actividades cerca tuyo en Buenos Aires." />
  <meta name="theme-color" content="#080A0F" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2238%22 fill=%22%2300F5D4%22/></svg>">
  <title>Sonda — La ciudad da señales</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">

  <style>
    :root{
      /* Sonda — dark urbana minimal, mapa vivo, señales */
      --bg:#080A0F;
      --bg-2:#0D1018;
      --surface:#121620;
      --surface-2:#191D2A;
      --surface-3:#232838;
      --text:#F5F7FA;
      --muted:#9CA3AF;
      --faint:#6B7280;
      --border:rgba(255,255,255,.08);
      --border-strong:rgba(255,255,255,.16);
      --glass:rgba(18,22,32,.78);
      /* señal primaria: ubicación, pins activos, CTAs principales */
      --coral:#00F5D4;
      --primary:#00F5D4;
      /* profundidad / categorías / metadata destacada */
      --coral-2:#7C5CFF;
      --secondary:#7C5CFF;
      /* estados positivos: "Voy" */
      --mint:#B6FF3B;
      --success:#B6FF3B;
      /* acción social / destacado: "Me interesa" */
      --blue:#00F5D4;
      --yellow:#FF4FD8;
      --accent:#FF4FD8;
      --warning:#FEE440;
      --ink:#04100E;
      --shadow:0 20px 60px rgba(0,0,0,.40);
      --radius-lg:24px;
      --radius-md:18px;
      --radius-sm:12px;
      --header-h:64px;
      color-scheme:dark;
    }

    *{box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    html,body{margin:0; min-height:100%; background:var(--bg);}
    body{
      color:var(--text);
      font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow-x:hidden;
    }
    button,input,select,textarea{font:inherit;}
    button{cursor:pointer;}
    a{color:inherit;}
    [hidden]{display:none!important;}
    .sr-only{
      position:absolute!important;
      width:1px;height:1px;
      padding:0;margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;border:0;
    }
    *:focus-visible{
      outline:2px solid var(--primary);
      outline-offset:3px;
    }

    .app{
      min-height:100dvh;
      background:
        radial-gradient(circle at 20% -10%, rgba(0,245,212,.10), transparent 32%),
        radial-gradient(circle at 100% 0%, rgba(124,92,255,.10), transparent 24%),
        var(--bg);
    }

    /* ---------- App header ---------- */
    .app-header{
      position:sticky;
      top:0;
      z-index:60;
      padding:14px 16px 12px;
      background:linear-gradient(180deg, rgba(8,10,15,.98), rgba(8,10,15,.92));
      border-bottom:1px solid var(--border);
      backdrop-filter:blur(18px);
    }
    .brand-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .brand-mark{
      position:relative;
      width:34px;height:34px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg, var(--primary), var(--secondary));
      color:var(--ink);
      box-shadow:0 0 0 5px rgba(0,245,212,.10);
      flex:0 0 auto;
    }
    .brand-mark::after{
      content:'';
      position:absolute;
      inset:-5px;
      border-radius:50%;
      border:1px solid rgba(0,245,212,.35);
      animation:brandPulse 2.4s ease-out infinite;
    }
    .brand-mark i{font-size:15px; position:relative;}
    @keyframes brandPulse{
      0%{transform:scale(.82); opacity:.9;}
      70%{transform:scale(1.25); opacity:0;}
      100%{transform:scale(1.25); opacity:0;}
    }
    .brand-name{
      display:block;
      font-family:'Space Grotesk',sans-serif;
      font-weight:700;
      letter-spacing:-.03em;
      line-height:1;
      font-size:20px;
    }
    .brand-kicker{
      display:block;
      margin-top:4px;
      color:var(--muted);
      font-family:'IBM Plex Mono',monospace;
      font-size:10px;
      letter-spacing:.05em;
      text-transform:uppercase;
      white-space:nowrap;
    }
    .header-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
    }
    .icon-btn,
    .location-btn,
    .account-btn,
    .chip,
    .segmented button,
    .sort-select,
    .ghost-btn,
    .primary-btn,
    .secondary-btn{
      border:0;
      -webkit-tap-highlight-color:transparent;
    }
    .icon-btn{
      width:38px;height:38px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background:rgba(247,241,232,.07);
      color:var(--text);
      border:1px solid var(--border);
    }
    .location-btn{
      min-height:38px;
      border-radius:999px;
      display:flex;
      align-items:center;
      gap:7px;
      padding:0 12px;
      background:rgba(247,241,232,.07);
      color:var(--text);
      border:1px solid var(--border);
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }
    .location-btn i{color:var(--mint); font-size:16px;}
    .account-btn{
      width:38px;height:38px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background:rgba(247,241,232,.07);
      color:var(--text);
      border:1px solid var(--border);
      font-size:18px;
      flex:0 0 auto;
    }
    .account-btn.logged-in{color:var(--mint); border-color:var(--mint);}
    .search-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:12px;
    }
    .search-row .search-box{flex:1 1 auto; min-width:0;}
    .search-row .location-btn{flex:0 0 auto;}
    .search-box{
      position:relative;
      display:flex;
      align-items:center;
      min-height:46px;
      border-radius:16px;
      background:rgba(247,241,232,.07);
      border:1px solid var(--border);
      overflow:hidden;
    }
    .search-box i{
      position:absolute;
      left:14px;
      color:var(--faint);
      font-size:18px;
      pointer-events:none;
    }
    .search-box input{
      width:100%;
      min-width:0;
      height:46px;
      padding:0 14px 0 42px;
      border:0;
      outline:0;
      background:transparent;
      color:var(--text);
      font-size:14px;
    }
    .search-box input::placeholder{color:var(--faint);}

    .segmented{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:4px;
      padding:4px;
      margin-bottom:12px;
      border-radius:16px;
      background:rgba(247,241,232,.08);
      border:1px solid var(--border);
    }
    .segmented button{
      height:38px;
      border-radius:12px;
      background:transparent;
      color:var(--muted);
      font-weight:800;
      font-size:13px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:7px;
    }
    .segmented button.active{
      background:var(--text);
      color:var(--ink);
      box-shadow:0 8px 18px rgba(0,0,0,.18);
    }

    /* ---------- Filters ---------- */
    .filters-shell{
      position:sticky;
      top:var(--header-h);
      z-index:55;
      padding:10px 16px 12px;
      background:rgba(17,18,26,.92);
      border-bottom:1px solid var(--border);
      backdrop-filter:blur(18px);
    }
    .rail{
      display:flex;
      gap:8px;
      overflow-x:auto;
      scrollbar-width:none;
      padding-bottom:1px;
    }
    .rail::-webkit-scrollbar{display:none;}
    .rail + .rail{margin-top:8px;}
    .filters-row{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .filters-row .chip{flex:0 0 auto;}
    .dropdown{
      position:relative;
      flex:1 1 0;
      min-width:0;
    }
    .dropdown-btn{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      min-height:38px;
      padding:0 12px;
      border-radius:14px;
      color:var(--text);
      background:rgba(247,241,232,.07);
      border:1px solid var(--border);
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
    }
    .dropdown-btn span{overflow:hidden; text-overflow:ellipsis;}
    .dropdown-btn i{font-size:15px; color:var(--faint); transition:transform .15s ease; flex:0 0 auto;}
    .dropdown-btn[aria-expanded="true"]{border-color:var(--coral);}
    .dropdown-btn[aria-expanded="true"] i{transform:rotate(180deg); color:var(--coral);}
    .dropdown-menu{
      position:absolute;
      top:calc(100% + 6px);
      left:0;
      z-index:60;
      min-width:100%;
      max-height:240px;
      overflow-y:auto;
      margin:0;
      padding:6px;
      list-style:none;
      border-radius:16px;
      background:var(--surface);
      border:1px solid var(--border-strong);
      box-shadow:0 16px 40px rgba(0,0,0,.4);
    }
    .dropdown-menu[hidden]{display:none;}
    .dropdown-menu li{
      padding:9px 11px;
      border-radius:10px;
      color:var(--muted);
      font-size:13px;
      font-weight:600;
      cursor:pointer;
      white-space:nowrap;
    }
    .dropdown-menu li:hover,
    .dropdown-menu li:focus-visible{background:rgba(247,241,232,.08); color:var(--text);}
    .dropdown-menu li[aria-selected="true"]{background:var(--coral); color:var(--ink); font-weight:800;}
    .chip{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      gap:7px;
      min-height:34px;
      padding:0 13px;
      border-radius:999px;
      background:rgba(247,241,232,.05);
      color:var(--muted);
      border:1px solid var(--border);
      font-weight:700;
      font-size:12px;
      white-space:nowrap;
      transition:transform .12s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .chip:active{transform:scale(.96);}
    .chip i{font-size:15px;}
    .chip.active{
      background:var(--coral);
      border-color:var(--coral);
      color:var(--ink);
      box-shadow:0 0 0 1px rgba(0,245,212,.25), 0 4px 14px rgba(0,245,212,.20);
    }
    .chip.active.alt{
      background:var(--mint);
      border-color:var(--mint);
      color:var(--ink);
      box-shadow:0 0 0 1px rgba(182,255,59,.25), 0 4px 14px rgba(182,255,59,.18);
    }

    /* ---------- Workspace ---------- */
    .workspace{
      position:relative;
      display:block;
      min-height:calc(100dvh - 280px);
      padding-bottom:96px;
    }
    .map-pane,
    .list-pane{padding:12px 16px 0;}
    .map-card{
      position:relative;
      overflow:hidden;
      height:min(62dvh,560px);
      min-height:360px;
      border-radius:var(--radius-lg);
      border:1px solid var(--border-strong);
      background:var(--surface);
      box-shadow:var(--shadow);
    }
    #map{width:100%; height:100%; background:var(--surface);}
    .leaflet-container{font-family:'Inter',sans-serif; background:var(--surface);}
    .leaflet-tile-pane{filter:saturate(.7) brightness(.85) hue-rotate(-4deg);}
    .leaflet-control-zoom a{
      background:rgba(18,22,32,.92)!important;
      color:var(--text)!important;
      border-color:var(--border)!important;
    }
    .leaflet-control-attribution{
      background:rgba(8,10,15,.75)!important;
      color:var(--faint)!important;
    }
    .leaflet-control-attribution a{color:var(--muted)!important;}
    .leaflet-popup-content-wrapper{
      background:var(--surface);
      color:var(--text);
      border-radius:16px;
      border:1px solid var(--border-strong);
      box-shadow:var(--shadow);
    }
    .leaflet-popup-tip{background:var(--surface);}
    .leaflet-popup-content{margin:14px; min-width:190px;}
    .popup-kicker{
      color:var(--coral-2);
      font-family:'IBM Plex Mono',monospace;
      font-size:10px;
      letter-spacing:.07em;
      text-transform:uppercase;
      font-weight:700;
    }
    .popup-title{margin:5px 0 6px; font-weight:800; line-height:1.2;}
    .popup-meta{color:var(--muted); font-size:12px; line-height:1.45;}
    .popup-button{
      margin-top:10px;
      width:100%;
      min-height:34px;
      border-radius:10px;
      background:var(--coral);
      color:var(--ink);
      font-weight:800;
      border:0;
    }

    .pin{
      position:relative;
      width:34px;height:34px;
      display:grid;
      place-items:center;
      border-radius:50%;
      background:var(--coral);
      border:2px solid var(--bg);
      box-shadow:0 8px 20px rgba(0,0,0,.35), 0 0 0 5px rgba(0,245,212,.14);
      transition:transform .15s ease, box-shadow .15s ease;
    }
    .pin i{color:var(--ink); font-size:15px;}
    .pin.going{background:var(--mint); box-shadow:0 8px 20px rgba(0,0,0,.35), 0 0 0 5px rgba(182,255,59,.16);}
    .pin.interested{background:var(--yellow); box-shadow:0 8px 20px rgba(0,0,0,.35), 0 0 0 5px rgba(255,79,216,.16);}
    .pin.going i,.pin.interested i{color:var(--ink);}
    .pin.active{transform:scale(1.22); z-index:1000;}
    .pin.active::after{
      content:'';
      position:absolute;
      inset:-6px;
      border-radius:50%;
      border:1.5px solid currentColor;
      color:var(--coral);
      animation:pinPulse 1.6s ease-out infinite;
    }
    .pin.going.active::after{color:var(--mint);}
    .pin.interested.active::after{color:var(--yellow);}
    @keyframes pinPulse{
      0%{transform:scale(.85); opacity:.8;}
      100%{transform:scale(1.5); opacity:0;}
    }
    .user-dot{
      position:relative;
      width:16px;height:16px;
      border-radius:50%;
      background:var(--blue);
      border:3px solid var(--bg);
      box-shadow:0 0 0 6px rgba(0,245,212,.18);
    }
    .user-dot::after{
      content:'';
      position:absolute;
      inset:-8px;
      border-radius:50%;
      border:1.5px solid rgba(0,245,212,.6);
      animation:pinPulse 1.8s ease-out infinite;
    }

    .map-status{
      position:absolute;
      left:12px;right:12px;top:12px;
      z-index:450;
      display:flex;
      align-items:center;
      gap:9px;
      padding:10px 12px;
      border-radius:16px;
      background:rgba(32,34,49,.88);
      border:1px solid var(--border-strong);
      backdrop-filter:blur(16px);
      color:var(--muted);
      font-size:12px;
      box-shadow:0 8px 28px rgba(0,0,0,.26);
    }
    .map-status strong{color:var(--text);}
    .map-status i{color:var(--mint); font-size:17px;}
    .map-status button{
      margin-left:auto;
      background:var(--mint);
      color:var(--ink);
      border:0;
      border-radius:999px;
      min-height:28px;
      padding:0 10px;
      font-size:11px;
      font-weight:900;
      white-space:nowrap;
    }
    .result-pill{
      position:absolute;
      left:12px;bottom:12px;
      z-index:450;
      display:flex;
      align-items:center;
      gap:8px;
      min-height:36px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(17,18,26,.82);
      border:1px solid var(--border-strong);
      backdrop-filter:blur(16px);
      color:var(--text);
      font-weight:800;
      font-size:12px;
    }
    .result-pill span{color:var(--mint); font-family:'IBM Plex Mono',monospace;}

    .nearby-strip{
      display:flex;
      gap:10px;
      overflow-x:auto;
      scrollbar-width:none;
      padding:12px 2px 2px;
    }
    .nearby-strip::-webkit-scrollbar{display:none;}
    .mini-card{
      flex:0 0 245px;
      text-align:left;
      border:1px solid var(--border);
      background:rgba(32,34,49,.85);
      color:var(--text);
      border-radius:18px;
      padding:12px;
      box-shadow:0 12px 32px rgba(0,0,0,.22);
    }
    .mini-card small{
      display:block;
      color:var(--coral-2);
      font-family:'IBM Plex Mono',monospace;
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.06em;
      font-weight:800;
      margin-bottom:6px;
    }
    .mini-card strong{
      display:block;
      font-size:14px;
      line-height:1.2;
      margin-bottom:8px;
    }
    .mini-meta{display:flex; gap:10px; color:var(--muted); font-size:12px;}

    /* ---------- List ---------- */
    .list-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin:2px 0 12px;
    }
    .list-title{margin:0; font-family:'Space Grotesk',sans-serif; font-size:18px; letter-spacing:-.04em;}
    .list-subtitle{margin:4px 0 0; color:var(--muted); font-size:12px; line-height:1.35;}
    .sort-select{
      flex:0 0 auto;
      min-height:38px;
      max-width:158px;
      padding:0 34px 0 12px;
      border-radius:14px;
      color:var(--text);
      background:rgba(247,241,232,.07);
      border:1px solid var(--border);
      font-size:12px;
      font-weight:800;
    }
    .cards{display:grid; gap:12px;}
    .event-card{
      position:relative;
      display:grid;
      grid-template-columns:92px 1fr;
      gap:12px;
      min-height:128px;
      padding:10px;
      border-radius:20px;
      background:linear-gradient(180deg, rgba(41,43,59,.98), rgba(32,34,49,.98));
      border:1px solid var(--border);
      color:var(--text);
      text-align:left;
      box-shadow:0 12px 36px rgba(0,0,0,.18);
      overflow:hidden;
    }
    .event-card::after{
      content:'';
      position:absolute;
      inset:auto 0 0;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(0,245,212,.45), transparent);
      opacity:0;
      transition:opacity .15s ease;
    }
    .event-card:hover,
    .event-card:focus-visible{border-color:var(--border-strong);}
    .event-card:hover::after{opacity:1;}
    .event-card:active{transform:scale(.99);}
    .event-card.ticket-flash{border-color:var(--coral); animation:ticketFlash 0.9s ease;}
    @keyframes ticketFlash{
      0%{ background:var(--surface-2); }
      30%{ background:rgba(0,245,212,.28); }
      100%{ background:var(--surface-2); }
    }
    .event-img{
      width:92px;height:108px;
      border-radius:15px;
      object-fit:cover;
      background:var(--surface-3);
      border:1px solid var(--border);
    }
    .event-body{min-width:0; display:flex; flex-direction:column; gap:8px;}
    .event-top{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:center;
    }
    .category-label{
      display:inline-flex;
      align-items:center;
      gap:5px;
      min-width:0;
      color:var(--coral-2);
      font-family:'IBM Plex Mono',monospace;
      font-size:10px;
      letter-spacing:.06em;
      text-transform:uppercase;
      font-weight:800;
    }
    .event-price{
      color:var(--mint);
      font-family:'IBM Plex Mono',monospace;
      font-weight:800;
      font-size:11px;
      white-space:nowrap;
    }
    .event-title{
      margin:0;
      font-family:'Space Grotesk',sans-serif;
      font-size:16px;
      line-height:1.2;
      font-weight:700;
      letter-spacing:-.02em;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .event-meta{
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      color:var(--muted);
      font-family:'IBM Plex Mono',monospace;
      font-size:11px;
      letter-spacing:.01em;
      line-height:1.2;
    }
    .event-meta span{
      display:inline-flex;
      align-items:center;
      gap:4px;
      max-width:100%;
    }
    .event-meta i{font-size:14px; color:var(--faint);}
    .event-address{
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .card-actions{
      margin-top:auto;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .status-badge,
    .distance-badge{
      display:inline-flex;
      align-items:center;
      gap:5px;
      min-height:24px;
      padding:0 8px;
      border-radius:999px;
      background:rgba(247,241,232,.07);
      color:var(--text);
      font-size:11px;
      font-weight:900;
      white-space:nowrap;
    }
    .status-badge.going{background:rgba(182,255,59,.15); color:var(--mint);}
    .status-badge.interested{background:rgba(255,79,216,.14); color:var(--yellow);}
    .distance-badge{margin-left:auto; font-family:'IBM Plex Mono',monospace; color:var(--text);}

    .empty-state{
      border:1px dashed var(--border-strong);
      border-radius:24px;
      padding:38px 22px;
      text-align:center;
      background:rgba(247,241,232,.04);
    }
    .empty-state i{font-size:34px; color:var(--faint);}
    .empty-state h3{margin:12px 0 6px; font-size:18px;}
    .empty-state p{margin:0; color:var(--muted); font-size:14px; line-height:1.45;}
    .empty-actions{display:flex; justify-content:center; gap:8px; margin-top:16px; flex-wrap:wrap;}

    .fab{
      position:fixed;
      right:18px;
      bottom:calc(18px + env(safe-area-inset-bottom));
      z-index:80;
      width:60px;height:60px;
      border-radius:22px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg, var(--coral), var(--yellow));
      color:var(--ink);
      border:0;
      box-shadow:0 16px 44px rgba(0,245,212,.35);
      font-size:27px;
    }
    .fab:active{transform:scale(.96);}
    .fab-label{display:none;}

    /* ---------- Sheets ---------- */
    .sheet-overlay{
      position:fixed;
      inset:0;
      z-index:1000;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:0;
      background:rgba(5,6,10,.72);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease;
    }
    .sheet-overlay.open{opacity:1; pointer-events:auto;}
    .sheet{
      position:relative;
      width:100%;
      max-width:560px;
      max-height:91dvh;
      overflow:auto;
      border-radius:28px 28px 0 0;
      border:1px solid var(--border-strong);
      border-bottom:0;
      background:linear-gradient(180deg, var(--surface), var(--bg-2));
      box-shadow:0 -18px 70px rgba(0,0,0,.46);
      transform:translateY(105%);
      transition:transform .24s cubic-bezier(.2,.8,.2,1);
    }
    .sheet-overlay.open .sheet{transform:translateY(0);}
    .sheet-handle{
      position:sticky;
      top:0;
      z-index:3;
      width:42px;height:5px;
      margin:10px auto 6px;
      border-radius:999px;
      background:rgba(247,241,232,.20);
    }
    .sheet-close{
      position:absolute;
      z-index:5;
      top:18px;right:18px;
      width:38px;height:38px;
      display:grid;
      place-items:center;
      border-radius:15px;
      border:1px solid var(--border);
      background:rgba(17,18,26,.78);
      color:var(--text);
      backdrop-filter:blur(14px);
    }

    .detail-hero{position:relative; padding:14px 14px 0;}
    .detail-img{
      width:100%;
      height:220px;
      object-fit:cover;
      border-radius:22px;
      background:var(--surface-3);
      border:1px solid var(--border);
    }
    .detail-content{padding:18px 20px 22px;}
    .detail-kicker{
      color:var(--coral-2);
      font-family:'IBM Plex Mono',monospace;
      font-size:11px;
      letter-spacing:.07em;
      text-transform:uppercase;
      font-weight:900;
    }
    .detail-title{
      margin:8px 0 14px;
      font-family:'Space Grotesk',sans-serif;
      font-size:24px;
      line-height:1.12;
      letter-spacing:-.05em;
    }
    .detail-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin:0 0 16px;
    }
    .info-box{
      min-height:70px;
      border-radius:16px;
      padding:11px 12px;
      background:rgba(247,241,232,.06);
      border:1px solid var(--border);
    }
    .info-box .label{
      display:block;
      color:var(--faint);
      text-transform:uppercase;
      letter-spacing:.05em;
      font-size:10px;
      font-weight:900;
      margin-bottom:5px;
    }
    .info-box .value{
      display:block;
      color:var(--text);
      font-weight:900;
      font-size:14px;
      line-height:1.25;
    }
    .detail-desc{
      margin:0 0 16px;
      color:var(--muted);
      font-size:14px;
      line-height:1.65;
    }
    .organizer-box{
      display:flex;
      align-items:center;
      gap:12px;
      padding:13px;
      border-radius:18px;
      background:rgba(247,241,232,.06);
      border:1px solid var(--border);
      margin-bottom:18px;
    }
    .avatar{
      width:42px;height:42px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:rgba(0,245,212,.18);
      color:var(--coral-2);
      font-weight:900;
    }
    .organizer-box small{display:block; color:var(--faint); font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em;}
    .organizer-box strong{display:block; margin-top:2px;}
    .detail-actions{
      position:sticky;
      bottom:0;
      display:grid;
      gap:10px;
      padding:14px 20px calc(18px + env(safe-area-inset-bottom));
      background:linear-gradient(180deg, rgba(23,24,36,.10), rgba(23,24,36,.98) 22%);
      border-top:1px solid var(--border);
      backdrop-filter:blur(16px);
    }
    .main-action-row,
    .minor-action-row{display:grid; gap:10px;}
    .main-action-row{grid-template-columns:1fr 1fr;}
    .minor-action-row{grid-template-columns:1fr 1fr 46px;}
    .primary-btn,
    .secondary-btn,
    .ghost-btn{
      min-height:46px;
      border-radius:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-weight:900;
      transition:transform .12s ease, filter .12s ease;
    }
    .primary-btn:active,
    .secondary-btn:active,
    .ghost-btn:active{transform:scale(.97);}
    .primary-btn{background:var(--coral); color:var(--ink); box-shadow:0 6px 18px rgba(0,245,212,.18);}
    .primary-btn.mint{background:var(--mint); color:var(--ink);}
    .primary-btn.yellow{background:var(--yellow); color:var(--ink);}
    .secondary-btn{
      background:rgba(247,241,232,.07);
      color:var(--text);
      border:1px solid var(--border);
    }
    .ghost-btn{
      background:transparent;
      color:var(--muted);
      border:1px solid var(--border);
      padding:0 14px;
    }

    /* ---------- Form ---------- */
    .form-content{padding:16px 20px 24px;}
    .form-title{
      margin:0 42px 6px 0;
      font-family:'Space Grotesk',sans-serif;
      font-size:23px;
      line-height:1.1;
      letter-spacing:-.05em;
    }
    .form-sub{margin:0 0 18px; color:var(--muted); font-size:14px; line-height:1.45;}
    .field{margin-bottom:14px;}
    .field-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    .field label{
      display:flex;
      justify-content:space-between;
      gap:8px;
      margin:0 0 7px;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      letter-spacing:.03em;
      text-transform:uppercase;
    }
    .field label em{font-style:normal; color:var(--faint); font-weight:700; text-transform:none; letter-spacing:0;}
    .field input,.field select,.field textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:15px;
      min-height:46px;
      padding:0 13px;
      color:var(--text);
      background:rgba(247,241,232,.07);
      outline:0;
    }
    .field textarea{padding:12px 13px; min-height:96px; resize:vertical; line-height:1.5;}
    .field input::placeholder,.field textarea::placeholder{color:var(--faint);}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--coral); box-shadow:0 0 0 4px rgba(0,245,212,.10);}
    .address-row{display:grid; grid-template-columns:1fr auto; gap:8px;}
    .address-row .secondary-btn{min-height:46px; padding:0 13px;}
    #formMap{
      height:210px;
      border-radius:18px;
      overflow:hidden;
      background:var(--surface);
      border:1px solid var(--border);
    }
    .helper-text,.form-note,.geocode-status{
      margin-top:7px;
      color:var(--faint);
      font-size:12px;
      line-height:1.45;
    }
    .geocode-status{min-height:18px; display:flex; align-items:center; gap:6px;}
    .geocode-status.ok{color:var(--mint);}
    .geocode-status.error{color:var(--coral-2);}
    .geocode-status.loading{color:var(--muted);}
    .spin{animation:spin .9s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .form-submit-row{
      position:sticky;
      bottom:0;
      padding:12px 0 0;
      background:linear-gradient(180deg, rgba(23,24,36,0), var(--bg-2) 34%);
    }
    .submit-btn{
      width:100%;
      min-height:52px;
      border-radius:17px;
      border:0;
      background:linear-gradient(135deg, var(--coral), var(--yellow));
      color:var(--ink);
      font-size:15px;
      font-weight:950;
    }
    .submit-btn:active{transform:scale(.98);}
    .forgot-password-link{
      display:block;
      width:100%;
      background:transparent;
      border:none;
      color:var(--mint);
      font-size:13px;
      font-weight:700;
      text-align:center;
      margin-top:14px;
      cursor:pointer;
    }
    .auth-mode-toggle{
      display:flex;
      background:rgba(247,241,232,.07);
      border:1px solid var(--border);
      border-radius:14px;
      padding:4px;
      gap:4px;
      margin-bottom:18px;
    }
    .auth-mode-toggle button{
      flex:1;
      border:none;
      background:transparent;
      color:var(--muted);
      font-weight:800;
      font-size:13px;
      padding:9px 0;
      border-radius:10px;
      transition:all .15s ease;
    }
    .auth-mode-toggle button.active{
      background:var(--coral);
      color:var(--ink);
    }
    .pref-list{display:flex; flex-direction:column; gap:8px; margin-bottom:18px;}
    .pref-item{
      display:flex; align-items:center; gap:10px;
      background:rgba(247,241,232,.06);
      border:1px solid var(--border);
      border-radius:14px;
      padding:11px 13px;
      cursor:pointer;
    }
    .pref-item i{font-size:18px; color:var(--muted); width:22px; text-align:center;}
    .pref-item span{flex:1; font-size:14px;}
    .pref-item input{width:18px; height:18px; accent-color:var(--coral);}
    .my-plans-section{margin-bottom:18px;}
    .my-plans-empty{font-size:13px; color:var(--muted); padding:11px 13px; background:rgba(247,241,232,.06); border:1px solid var(--border); border-radius:14px;}
    .my-plan-item{
      display:flex; align-items:center; gap:10px;
      background:rgba(247,241,232,.06);
      border:1px solid var(--border);
      border-radius:14px;
      padding:11px 13px;
      cursor:pointer;
      margin-bottom:8px;
    }
    .my-plan-item:last-child{margin-bottom:0;}
    .my-plan-info{flex:1; min-width:0;}
    .my-plan-title{font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .my-plan-meta{font-size:12px; color:var(--muted);}
    .my-plan-badges{display:flex; gap:6px; flex-shrink:0;}
    .my-plan-badge{
      font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px;
    }
    .my-plan-badge.interested{background:rgba(255,79,216,.15); color:var(--yellow);}
    .my-plan-badge.going{background:rgba(182,255,59,.15); color:var(--mint);}

    .toast{
      position:fixed;
      left:16px;right:16px;
      bottom:calc(88px + env(safe-area-inset-bottom));
      z-index:1200;
      min-height:46px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px 14px;
      border-radius:16px;
      background:var(--mint);
      color:var(--ink);
      font-weight:900;
      box-shadow:0 14px 40px rgba(0,0,0,.34);
      opacity:0;
      transform:translateY(12px);
      pointer-events:none;
      transition:opacity .2s ease, transform .2s ease;
      text-align:center;
    }
    .toast.show{opacity:1; transform:translateY(0);}

    /* ---------- Desktop ---------- */
    @media (min-width:980px){
      :root{--header-h:68px;}
      body{overflow:hidden;}
      .app{height:100dvh; overflow:hidden;}
      .app-header{padding:16px 28px 14px;}
      .brand-name{font-size:23px;}
      .filters-shell{padding:14px 28px;}
      .search-row{max-width:560px;}
      .segmented{display:none;}
      .filters-row{max-width:560px;}
      .dropdown{max-width:220px; flex:0 1 220px;}
      .workspace{
        height:calc(100dvh - 192px);
        display:grid;
        grid-template-columns:minmax(420px, .92fr) minmax(520px, 1.08fr);
        gap:0;
        padding:0;
        overflow:hidden;
      }
      .list-pane,
      .map-pane{display:block!important; padding:18px 20px 28px; height:100%; overflow:auto;}
      .list-pane{grid-column:1; border-right:1px solid var(--border); padding-left:28px;}
      .map-pane{grid-column:2; padding-right:28px;}
      .map-card{height:100%; min-height:0; border-radius:28px;}
      .nearby-strip{display:none;}
      .cards{padding-bottom:22px;}
      .event-card{grid-template-columns:118px 1fr; min-height:148px; padding:12px;}
      .event-img{width:118px; height:124px;}
      .event-title{font-size:18px;}
      .fab{
        right:32px;
        bottom:28px;
        width:auto;
        min-width:184px;
        height:56px;
        grid-auto-flow:column;
        gap:8px;
        padding:0 18px;
        border-radius:18px;
        font-size:22px;
      }
      .fab-label{display:block; font-size:14px; font-weight:950;}
      .sheet-overlay{align-items:center; padding:24px;}
      .sheet{border-radius:28px; border:1px solid var(--border-strong); max-height:88dvh;}
      .detail-img{height:260px;}
      .toast{left:50%; right:auto; width:min(440px, calc(100% - 32px)); transform:translate(-50%,12px); bottom:28px;}
      .toast.show{transform:translate(-50%,0);}
    }

    @media (max-width:430px){
      .location-btn span{display:none;}
      .location-btn{width:46px; justify-content:center; padding:0; border-radius:16px;}
      .brand-name{font-size:18px;}
      .event-card{grid-template-columns:84px 1fr;}
      .event-img{width:84px; height:104px;}
      .event-title{font-size:15px;}
      .field-row{grid-template-columns:1fr; gap:0;}
      .minor-action-row{grid-template-columns:1fr 1fr;}
      .minor-action-row .secondary-btn:last-child{grid-column:1/-1;}
    }

    @media (prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.001ms!important; transition-duration:.001ms!important; scroll-behavior:auto!important;}
    }

          <div>
            <h1 class="list-title" id="resultsTitle">Planes para hoy</h1>

          </div>

      <button type="button" class="fab" id="addEventBtn" aria-label="Sumar un plan">

  </div>

function todayStr(){
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd}`;
}

function uid(){
  return 'ev-' + Date.now() + '-' + Math.random().toString(36).slice(2,8);
}

function parseLocalDate(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function minutesFromMidnight(time){
  const [h,m] = String(time || '00:00').split(':').map(Number);
  return (h || 0) * 60 + (m || 0);
}

function daysUntil(dateStr){
  const start = parseLocalDate(todayStr());
  const end = parseLocalDate(dateStr);
  return Math.round((end - start) / 86400000);
}

function fmtDate(dateStr){
  const d = parseLocalDate(dateStr);
  const diff = daysUntil(dateStr);
  if(diff === 0) return 'Hoy';
  if(diff === 1) return 'Mañana';
  const days = ['dom','lun','mar','mié','jue','vie','sáb'];
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function isFree(price){
  return /gratis|libre|sin cargo|free/i.test(String(price || ''));
}

function haversine(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function fmtDist(km){
  if(km == null || Number.isNaN(km)) return '—';
  if(km < 1) return Math.round(km * 1000) + ' m';
  return km.toFixed(1).replace('.0','') + ' km';
}

function catInfo(id){
  return CATEGORIES.find(cat => cat.id === id) || {id, label:id, icon:'ti-tag'};
}

function escapeHtml(value){
  const div = document.createElement('div');
  div.textContent = value == null ? '' : String(value);
  return div.innerHTML;
}

function normalizeText(value){
  return String(value || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
}

function loadLocalJson(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(error){
    return fallback;
  }
}

function saveLocalJson(key, value){
  try{ localStorage.setItem(key, JSON.stringify(value)); }
  catch(error){ console.warn('No se pudo guardar en localStorage', error); }
}

function getInteraction(id){
  const raw = state.interactions[id];
  if(!raw) return {interested:false, going:false};
  if(typeof raw === 'string'){
    return {interested:raw === 'interesa', going:raw === 'voy'};
  }
  return {interested:!!raw.interested, going:!!raw.going};
}

function setInteraction(id, next){
  if(!next.interested && !next.going){
    delete state.interactions[id];
  }else{
    state.interactions[id] = next;
  }
  saveLocalJson(STORAGE_KEYS.interactions, state.interactions);
}

function getMyPlans(){
  return state.events
    .filter(ev => {
      const i = getInteraction(ev.id);
      return i.interested || i.going;
    })
    .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
}

function showToast(message){
  window.clearTimeout(toastTimer);
  els.toast.textContent = message;
  els.toast.classList.add('show');
  toastTimer = window.setTimeout(() => els.toast.classList.remove('show'), 2400);
}

function syncDropdown(menu, label, value){
  let matchedText = '';
  menu.querySelectorAll('li').forEach(li => {
    const selected = li.dataset.value === value;
    li.setAttribute('aria-selected', String(selected));
    if(selected) matchedText = li.textContent;
  });
  if(label && matchedText) label.textContent = matchedText;
}

function buildFilters(){
  if(!els.categoryFilterMenu.children.length){
    els.categoryFilterMenu.innerHTML = ALL_CATEGORY_CHIPS.map(cat =>
      `<li role="option" data-value="${cat.id}" aria-selected="false">${cat.label}</li>`
    ).join('');
  }
  syncDropdown(els.dateFilterMenu, els.dateFilterLabel, state.dateFilter);
  syncDropdown(els.categoryFilterMenu, els.categoryFilterLabel, state.activeCategory);
  els.freeToggleBtn.classList.toggle('active', state.freeOnly);
  els.freeToggleBtn.setAttribute('aria-pressed', state.freeOnly);
}

const dropdownClosers = [];

function closeAllDropdowns(){
  dropdownClosers.forEach(close => close());
}

function initDropdown(btn, menu, onSelect){
  function close(){
    menu.hidden = true;
    btn.setAttribute('aria-expanded', 'false');
  }
  function open(){
    closeAllDropdowns();
    menu.hidden = false;
    btn.setAttribute('aria-expanded', 'true');
  }
  btn.addEventListener('click', event => {
    event.stopPropagation();
    if(menu.hidden) open(); else close();
  });
  menu.addEventListener('click', event => {
    const li = event.target.closest('[data-value]');
    if(!li) return;
    onSelect(li.dataset.value);
    close();
  });
  dropdownClosers.push(close);
}

function getFilteredEvents(){
  const today = todayStr();
  const q = normalizeText(state.query);
  let list = state.events
    .filter(ev => daysUntil(ev.date) >= 0)
    .filter(ev => state.activeCategory === 'todos' || ev.category === state.activeCategory)
    .filter(ev => {
      if(state.dateFilter === 'hoy') return ev.date === today;
      if(state.dateFilter === 'semana') return daysUntil(ev.date) <= 7;
      return true;
    })
    .filter(ev => !state.freeOnly || isFree(ev.price))
    .filter(ev => {
      if(!q) return true;
      const haystack = normalizeText([ev.title, ev.category, catInfo(ev.category).label, ev.address, ev.organizer, ev.desc, ev.price].join(' '));
      return haystack.includes(q);
    })
    .map(ev => ({
      ...ev,
      _dist: state.userLocation ? haversine(state.userLocation.lat, state.userLocation.lng, Number(ev.lat), Number(ev.lng)) : null
    }));

  list.sort((a,b) => {
    if(state.sortBy === 'distance' && state.userLocation){
      return (a._dist ?? 9999) - (b._dist ?? 9999);
    }
    if(state.sortBy === 'price'){
      const freeDiff = Number(isFree(b.price)) - Number(isFree(a.price));
      if(freeDiff !== 0) return freeDiff;
    }
    const dateDiff = parseLocalDate(a.date) - parseLocalDate(b.date);
    if(dateDiff !== 0) return dateDiff;
    return minutesFromMidnight(a.time) - minutesFromMidnight(b.time);
  });

  return list;
}

function initMap(){
  map = L.map('map', {zoomControl:false, attributionControl:true}).setView(BA_CENTER, 12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; OpenStreetMap &copy; CARTO',
    maxZoom:19
  }).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
}

function makeEventIcon(ev){
  const interaction = getInteraction(ev.id);
  const statusClass = interaction.going ? 'going' : interaction.interested ? 'interested' : '';
  const activeClass = state.selectedId === ev.id ? 'active' : '';
  return L.divIcon({
    className:'',
    html:`<div class="pin ${statusClass} ${activeClass}" id="pin-${ev.id}"><i class="ti ${catInfo(ev.category).icon}"></i></div>`,
    iconSize:[34,34],
    iconAnchor:[17,17],
    popupAnchor:[0,-22]
  });
}

function renderMap(list){
  if(!map) return;
  markersLayer.clearLayers();
  markerById = {};

  list.forEach(ev => {
    const marker = L.marker([Number(ev.lat), Number(ev.lng)], {icon:makeEventIcon(ev)}).addTo(markersLayer);
    markerById[ev.id] = marker;
    marker.bindPopup(`
      <div class="popup-kicker">${escapeHtml(catInfo(ev.category).label)}</div>
      <div class="popup-title">${escapeHtml(ev.title)}</div>
      <div class="popup-meta">${fmtDate(ev.date)} · ${escapeHtml(ev.time)} · ${escapeHtml(ev.price)}${ev._dist != null ? ' · ' + fmtDist(ev._dist) : ''}</div>
      <button type="button" class="popup-button" data-open-detail="${ev.id}">Ver detalle</button>
    `);
    marker.on('click', () => {
      state.selectedId = ev.id;
      highlightCard(ev.id);
      renderMap(getFilteredEvents());
      markerById[ev.id]?.openPopup();
    });
  });

  if(state.userLocation){
    const userIcon = L.divIcon({className:'', html:'<div class="user-dot"></div>', iconSize:[18,18], iconAnchor:[9,9]});
    userMarker = L.marker([state.userLocation.lat, state.userLocation.lng], {icon:userIcon, zIndexOffset:1000}).addTo(markersLayer);
  }

  els.resultCount.textContent = list.length;
}

function renderList(list){
  const titleByDate = {
    hoy:'Planes para hoy',
    semana:'Planes de esta semana',
    todos:'Próximos planes'
  };
  const catLabel = state.activeCategory === 'todos' ? '' : ` · ${catInfo(state.activeCategory).label}`;
  els.resultsTitle.textContent = `${titleByDate[state.dateFilter]}${state.freeOnly ? ' gratis' : ''}${catLabel}`;

  const subtitleParts = [];
  subtitleParts.push(`${list.length} resultado${list.length === 1 ? '' : 's'}`);
  if(state.userLocation) subtitleParts.push('ordenable por cercanía');
  else subtitleParts.push('activá ubicación para ver distancias reales');
  els.resultsSubtitle.textContent = subtitleParts.join(' · ');

  if(!list.length){
    els.listView.innerHTML = `
      <div class="empty-state">
        <i class="ti ti-map-search" aria-hidden="true"></i>
        <h3>No encontramos señales por acá</h3>
        <p>Probá ampliar la fecha, sacar "Gratis" o cambiar de categoría. También podés sumar un plan nuevo.</p>
        <div class="empty-actions">
          <button type="button" class="ghost-btn" id="resetFiltersBtn"><i class="ti ti-refresh"></i>Limpiar filtros</button>
          <button type="button" class="secondary-btn" id="emptyAddBtn"><i class="ti ti-plus"></i>Sumar plan</button>
        </div>
      </div>`;
    document.getElementById('resetFiltersBtn')?.addEventListener('click', resetFilters);
    document.getElementById('emptyAddBtn')?.addEventListener('click', openForm);
    return;
  }

  els.listView.innerHTML = list.map(ev => eventCardHtml(ev)).join('');
}

function eventCardHtml(ev){
  const cat = catInfo(ev.category);
  const interaction = getInteraction(ev.id);
  let status = '';
  if(interaction.going) status += '<span class="status-badge going"><i class="ti ti-check"></i>Voy</span>';
  if(interaction.interested) status += '<span class="status-badge interested"><i class="ti ti-star-filled"></i>Me interesa</span>';
  return `
    <button type="button" class="event-card" data-card-id="${ev.id}" aria-label="Ver detalle de ${escapeHtml(ev.title)}">
      <img class="event-img" src="${escapeHtml(ev.img || FALLBACK_IMG)}" alt="" loading="lazy" onerror="this.src='${FALLBACK_IMG}'">
      <span class="event-body">
        <span class="event-top">
          <span class="category-label"><i class="ti ${cat.icon}" aria-hidden="true"></i>${escapeHtml(cat.label)}</span>
          <span class="event-price">${escapeHtml(ev.price)}</span>
        </span>
        <strong class="event-title">${escapeHtml(ev.title)}</strong>
        <span class="event-meta">
          <span><i class="ti ti-calendar" aria-hidden="true"></i>${fmtDate(ev.date)}</span>
          <span><i class="ti ti-clock" aria-hidden="true"></i>${escapeHtml(ev.time)}</span>
          <span class="event-address"><i class="ti ti-map-pin" aria-hidden="true"></i>${escapeHtml(ev.address)}</span>
        </span>
        <span class="card-actions">
          ${status}
          <span class="distance-badge">${fmtDist(ev._dist)}</span>
        </span>
      </span>
    </button>`;
}

function renderNearbyStrip(list){
  const top = list.slice(0,5);
  els.nearbyStrip.hidden = !top.length;
  els.nearbyStrip.innerHTML = top.map(ev => `
    <button type="button" class="mini-card" data-mini-id="${ev.id}">
      <small>${escapeHtml(catInfo(ev.category).label)}</small>
      <strong>${escapeHtml(ev.title)}</strong>
      <span class="mini-meta"><span>${fmtDate(ev.date)}</span><span>${escapeHtml(ev.time)}</span><span>${fmtDist(ev._dist)}</span></span>
    </button>
  `).join('');
}

function renderView(){
  const desktop = window.matchMedia('(min-width:980px)').matches;
  els.mapPane.hidden = !desktop && state.currentView !== 'mapa';
  els.listPane.hidden = !desktop && state.currentView !== 'lista';

  document.querySelectorAll('[data-view]').forEach(btn => {
    const active = btn.dataset.view === state.currentView;
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-pressed', String(active));
  });

  if(!els.mapPane.hidden && map){
    window.setTimeout(() => map.invalidateSize(), 70);
  }
}

function render(){
  buildFilters();
  const list = getFilteredEvents();
  renderView();
  renderMap(list);
  renderList(list);
  renderNearbyStrip(list);
  renderLocationStatus();

  if(list.length && map && !els.mapPane.hidden){
    const coords = list.map(ev => [Number(ev.lat), Number(ev.lng)]);
    if(state.userLocation) coords.push([state.userLocation.lat, state.userLocation.lng]);
    const bounds = L.latLngBounds(coords);
    map.fitBounds(bounds.pad(.18), {animate:false, maxZoom:14});
  }
}

function renderLocationStatus(){
  const hasLocation = !!state.userLocation;
  els.mapStatus.hidden = hasLocation;
  els.locationLabel.textContent = hasLocation ? 'Cerca de tu ubicación' : 'Qué está pasando cerca tuyo';
  els.locationBtn.querySelector('span').textContent = hasLocation ? 'Ubicación activa' : 'Usar ubicación';
  els.sortSelect.querySelector('option[value="distance"]').disabled = !hasLocation;
  if(!hasLocation && state.sortBy === 'distance'){
    state.sortBy = 'date';
    els.sortSelect.value = 'date';
  }
}

function setView(view){
  state.currentView = view;
  renderView();
  if(view === 'mapa' && map){
    window.setTimeout(() => map.invalidateSize(), 80);
  }
}

function resetFilters(){
  state.activeCategory = 'todos';
  state.dateFilter = 'hoy';
  state.freeOnly = false;
  state.query = '';
  els.searchInput.value = '';
  els.clearSearchBtn.hidden = true;
  render();
}

function requestLocation(){
  if(!navigator.geolocation){
    showToast('Tu navegador no permite geolocalización');
    return;
  }
  els.locationBtn.disabled = true;
  els.locationBtn.querySelector('span').textContent = 'Buscando...';
  navigator.geolocation.getCurrentPosition(
    pos => {
      state.userLocation = {lat:pos.coords.latitude, lng:pos.coords.longitude};
      state.sortBy = 'distance';
      els.sortSelect.value = 'distance';
      els.locationBtn.disabled = false;
      showToast('Ubicación activada. Ordenamos por cercanía.');
      render();
    },
    () => {
      els.locationBtn.disabled = false;

function toggleInterest(id){
  const current = getInteraction(id);
  setInteraction(id, {...current, interested:!current.interested});
  openDetail(id);
  render();
}

function toggleGoing(id){
  const current = getInteraction(id);
  const going = !current.going;
  setInteraction(id, {interested:going ? true : current.interested, going});
  openDetail(id);
  render();
}

function openRoute(ev){
  const destination = `${ev.lat},${ev.lng}`;
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destination)}`, '_blank', 'noopener,noreferrer');
}

async function shareEvent(ev){
  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.lat + ',' + ev.lng)}`;
  const text = `${ev.title}\n${fmtDate(ev.date)} · ${ev.time}\n${ev.address}\n${mapsUrl}`;
  try{
    if(navigator.share){
      await navigator.share({title:ev.title, text});
    }else if(navigator.clipboard){
      await navigator.clipboard.writeText(text);
      showToast('Plan copiado al portapapeles');
    }else{
      showToast('Copiá el link desde Google Maps');
    }
  }catch(error){
    // El usuario puede cancelar el share sheet; no hace falta mostrar error.
  }
}

function openSheet(overlay){
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden','false');
  document.body.style.overflow = 'hidden';
  window.setTimeout(() => overlay.querySelector('button, input, select, textarea')?.focus(), 80);
}

function closeSheet(overlay){
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden','true');
  document.body.style.overflow = '';
  if(overlay === els.formOverlay && formMap){
    formMap.remove();
    formMap = null;
    formMarker = null;
  }
}

function initFormMap(){
  const start = state.userLocation ? [state.userLocation.lat, state.userLocation.lng] : BA_CENTER;
  formMap = L.map('formMap', {zoomControl:true, attributionControl:false}).setView(start, 14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {maxZoom:19}).addTo(formMap);
  const icon = L.divIcon({className:'', html:'<div class="pin"><i class="ti ti-map-pin-plus"></i></div>', iconSize:[34,34], iconAnchor:[17,17]});
  formMarker = L.marker(start, {icon, draggable:true}).addTo(formMap);
  formMap.on('click', event => formMarker.setLatLng(event.latlng));
  window.setTimeout(() => formMap.invalidateSize(), 160);
}

async function geocodeAddress(){
  const input = document.getElementById('fAddress');
  const status = document.getElementById('geocodeStatus');
  const query = input.value.trim();
  if(query.length < 4){
    status.className = 'geocode-status error';
    status.innerHTML = '<i class="ti ti-alert-circle"></i>Escribí una dirección más específica.';
    return;
  }
  status.className = 'geocode-status loading';
  status.innerHTML = '<i class="ti ti-loader-2 spin"></i>Buscando ubicación...';

  try{
    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=ar&q=${encodeURIComponent(query + ', Ciudad Autónoma de Buenos Aires, Argentina')}`;
    const response = await fetch(url, {headers:{'Accept-Language':'es'}});
    const data = await response.json();
    if(!Array.isArray(data) || !data.length) throw new Error('not-found');
    const lat = Number(data[0].lat);
    const lng = Number(data[0].lon);
    formMarker.setLatLng([lat,lng]);
    formMap.setView([lat,lng], 16);
    status.className = 'geocode-status ok';
    status.innerHTML = '<i class="ti ti-map-pin-check"></i>Ubicación encontrada. Ajustá el pin si hace falta.';
  }catch(error){
    status.className = 'geocode-status error';
    status.innerHTML = '<i class="ti ti-map-pin-off"></i>No encontramos esa dirección. Ubicá el pin a mano.';
  }
}

function validateImageUrl(value){
  if(!value) return '';
  try{
    const url = new URL(value);
    return /^https?:$/.test(url.protocol) ? value : '';
  }catch(error){
    return '';
  }
}

function handleFormSubmit(event){
  event.preventDefault();
  const form = event.currentTarget;
  const required = [...form.querySelectorAll('[required]')];
  const firstInvalid = required.find(field => !field.value.trim());
  if(firstInvalid){
    firstInvalid.focus();
    showToast('Completá los campos obligatorios');
    return;
  }
  const dateValue = document.getElementById('fDate').value;
  if(daysUntil(dateValue) < 0){
    showToast('La fecha no puede ser anterior a hoy');
    return;
  }
  const pos = formMarker.getLatLng();
  const newEvent = {
    id:uid(),
    title:document.getElementById('fTitle').value.trim(),
    category:document.getElementById('fCategory').value,
    price:document.getElementById('fPrice').value.trim(),
    date:dateValue,
    time:document.getElementById('fTime').value,
    address:document.getElementById('fAddress').value.trim(),
    organizer:document.getElementById('fOrganizer').value.trim(),
    desc:document.getElementById('fDesc').value.trim(),
    img:validateImageUrl(document.getElementById('fImg').value.trim()) || FALLBACK_IMG,
    lat:pos.lat,
    lng:pos.lng
  };
  state.events.unshift(newEvent);
  saveLocalJson(STORAGE_KEYS.events, state.events);
  state.activeCategory = 'todos';
  state.dateFilter = daysUntil(dateValue) === 0 ? 'hoy' : 'todos';
  state.freeOnly = false;
  closeSheet(els.formOverlay);
  render();
  selectOnMap(newEvent.id);
  showToast('Plan publicado en el radar');
}

async function loadPreferences(){
  if(!currentUser){ userPreferences = new Set(); return; }
  const { data, error } = await supabaseClient
    .from('category_preferences')
    .select('category_id')
    .eq('user_id', currentUser.id);
  userPreferences = error || !data ? new Set() : new Set(data.map(r => r.category_id));
}

async function ensureProfile(){
  if(!currentUser) return;
  await supabaseClient
    .from('profiles')
    .upsert({ id: currentUser.id, display_name: currentUser.email }, { onConflict: 'id' });
}

async function togglePreference(categoryId, checked){
  if(!currentUser) return;
  if(checked){
    userPreferences.add(categoryId);
    await supabaseClient.from('category_preferences').upsert({ user_id: currentUser.id, category_id: categoryId });
  }else{
    userPreferences.delete(categoryId);
    await supabaseClient.from('category_preferences').delete().eq('user_id', currentUser.id).eq('category_id', categoryId);
  }
}

async function handleAuthSubmit(e, getMode){
  e.preventDefault();
  const mode = getMode();
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const status = document.getElementById('authStatus');

  if(mode === 'signup'){
    status.textContent = 'Creando cuenta...';
    const { data, error } = await supabaseClient.auth.signUp({ email, password });
    if(error){
      status.textContent = error.message.includes('already registered')
        ? 'Ese email ya tiene una cuenta. Probá ingresar.'
        : 'No se pudo crear la cuenta. Probá de nuevo.';
    }else if(!data.session){
      status.textContent = 'Cuenta creada. Revisá tu email para confirmarla y después ingresá.';
    }else{
      status.textContent = 'Cuenta creada.';
    }
  }else{
    status.textContent = 'Ingresando...';
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    status.textContent = error ? 'Email o contraseña incorrectos.' : 'Listo.';
  }
}

async function handleSetNewPassword(e){
  e.preventDefault();
  const password = document.getElementById('newPassword').value;
  const status = document.getElementById('newPasswordStatus');
  status.textContent = 'Guardando...';
  const { error } = await supabaseClient.auth.updateUser({ password });
  if(error){
    status.textContent = 'No se pudo guardar la contraseña. Probá de nuevo.';
    return;
  }
  passwordRecoveryMode = false;
  showToast('Contraseña actualizada');
  renderAccountSheet();
}

async function handleForgotPassword(){
  const email = document.getElementById('authEmail').value.trim();
  const status = document.getElementById('authStatus');
  if(!email){
    status.textContent = 'Escribí tu email arriba para poder enviarte el link.';
    return;
  }
  status.textContent = 'Enviando link de recuperación...';
  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.href
  });
  status.textContent = error
    ? 'No se pudo enviar el link. Probá de nuevo en un rato.'
    : 'Listo, revisá tu email y tocá el link para definir una contraseña nueva.';
}

/* ---------- Bindings / init ---------- */

function bindEvents(){
  document.addEventListener('click', event => {
    const detailBtn = event.target.closest('[data-open-detail]');
    if(detailBtn){
      openDetail(detailBtn.dataset.openDetail);
      return;
    }
    const card = event.target.closest('[data-card-id]');
    if(card){
      openDetail(card.dataset.cardId);
      return;
    }
    const mini = event.target.closest('[data-mini-id]');
    if(mini){
      selectOnMap(mini.dataset.miniId);
    }
  });

  document.addEventListener('mouseover', event => {
    const card = event.target.closest('[data-card-id]');
    if(card) highlightPin(card.dataset.cardId, true);
  });
  document.addEventListener('mouseout', event => {
    const card = event.target.closest('[data-card-id]');
    if(card) highlightPin(card.dataset.cardId, false);
  });

  initDropdown(els.dateFilterBtn, els.dateFilterMenu, value => {
    state.dateFilter = value;
    render();
  });

  initDropdown(els.categoryFilterBtn, els.categoryFilterMenu, value => {
    state.activeCategory = value;
    render();
  });

  document.addEventListener('click', closeAllDropdowns);
  document.addEventListener('keydown', event => {
    if(event.key === 'Escape') closeAllDropdowns();
  });

  els.freeToggleBtn.addEventListener('click', () => {
    state.freeOnly = !state.freeOnly;
    render();
  });

  document.querySelectorAll('[data-view]').forEach(btn => {
    btn.addEventListener('click', () => setView(btn.dataset.view));
  });

  els.searchInput.addEventListener('input', event => {
    state.query = event.target.value.trim();
    els.clearSearchBtn.hidden = !state.query;
    render();
  });

  els.clearSearchBtn.addEventListener('click', () => {
    state.query = '';
    els.searchInput.value = '';
    els.clearSearchBtn.hidden = true;
    els.searchInput.focus();
    render();
  });

  els.sortSelect.addEventListener('change', event => {
    state.sortBy = event.target.value;
    if(state.sortBy === 'distance' && !state.userLocation){
      requestLocation();
      return;
    }
    render();
  });

  els.locationBtn.addEventListener('click', requestLocation);
  els.mapLocationBtn.addEventListener('click', requestLocation);
  els.addEventBtn.addEventListener('click', openForm);
  els.accountBtn.addEventListener('click', openAccountSheet);

  [els.detailOverlay, els.formOverlay, els.accountOverlay].forEach(overlay => {
    overlay.addEventListener('click', event => {
      if(event.target === overlay) closeSheet(overlay);
    });
  });

  window.addEventListener('keydown', event => {
    if(event.key === 'Escape'){
      if(els.detailOverlay.classList.contains('open')) closeSheet(els.detailOverlay);
      if(els.formOverlay.classList.contains('open')) closeSheet(els.formOverlay);
      if(els.accountOverlay.classList.contains('open')) closeSheet(els.accountOverlay);
    }
  });

  window.addEventListener('resize', debounce(() => {
    renderView();
    map?.invalidateSize();
  }, 150));
}

function debounce(fn, delay){
  let timer;
  return (...args) => {
    window.clearTimeout(timer);
    timer = window.setTimeout(() => fn(...args), delay);
  };
}

  els.app = document.getElementById('app');
  els.locationLabel = document.getElementById('locationLabel');

  els.accountBtn = document.getElementById('accountBtn');

  els.clearSearchBtn = document.getElementById('clearSearchBtn');

  els.dateFilterMenu = document.getElementById('dateFilterMenu');
  els.dateFilterLabel = document.getElementById('dateFilterLabel');
  els.categoryFilterBtn = document.getElementById('categoryFilterBtn');
  els.categoryFilterMenu = document.getElementById('categoryFilterMenu');
  els.categoryFilterLabel = document.getElementById('categoryFilterLabel');
  els.freeToggleBtn = document.getElementById('freeToggleBtn');
  els.workspace = document.getElementById('workspace');
  els.mapPane = document.getElementById('mapPane');
  els.listPane = document.getElementById('listPane');
  els.mapStatus = document.getElementById('mapStatus');
  els.mapLocationBtn = document.getElementById('mapLocationBtn');
  els.resultCount = document.getElementById('resultCount');
  els.nearbyStrip = document.getElementById('nearbyStrip');
  els.resultsTitle = document.getElementById('resultsTitle');
  els.resultsSubtitle = document.getElementById('resultsSubtitle');
  els.sortSelect = document.getElementById('sortSelect');
  els.listView = document.getElementById('listView');
  els.addEventBtn = document.getElementById('addEventBtn');
  els.detailOverlay = document.getElementById('detailOverlay');
  els.detailSheet = document.getElementById('detailSheet');
  els.formOverlay = document.getElementById('formOverlay');
  els.formSheet = document.getElementById('formSheet');
  els.accountOverlay = document.getElementById('accountOverlay');
  els.accountSheet = document.getElementById('accountSheet');
  els.toast = document.getElementById('toast');
}

async function init(){
  cacheElements();
  const storedEvents = loadLocalJson(STORAGE_KEYS.events, null);
  state.events = Array.isArray(storedEvents) && storedEvents.length ? storedEvents : SEED_EVENTS;
  state.interactions = loadLocalJson(STORAGE_KEYS.interactions, {});
  saveLocalJson(STORAGE_KEYS.events, state.events);
  initMap();
  bindEvents();
  render();

  const { data: sessionData } = await supabaseClient.auth.getSession();
  currentUser = sessionData?.session?.user || null;
  if(currentUser){
    await ensureProfile();
    await loadPreferences();
  }
  updateAccountBtn();

  supabaseClient.auth.onAuthStateChange(async (event, session) => {
    currentUser = session?.user || null;
    if(event === 'PASSWORD_RECOVERY'){
      passwordRecoveryMode = true;
      openAccountSheet();
      return;
    }
    if(currentUser){
      await ensureProfile();
      await loadPreferences();
    }else{
      userPreferences = new Set();
    }
    updateAccountBtn();
    if(els.accountOverlay.classList.contains('open')){
      renderAccountSheet();
    }
  });
}

document.addEventListener('DOMContentLoaded', init);

  </script>
