<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Descubrí planes y eventos cerca de tuyo en Buenos Aires: cine, música, ferias, talleres y más.">
<meta name="theme-color" content="#1A1B23">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%23FF6B4A%22/></svg>">
<title>Radar de Planes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  *:focus-visible{
    outline:2px solid var(--mint);
    outline-offset:2px;
  }

  :root{
    --bg: #1A1B23;
    --bg-elevated: #232430;
    --bg-card: #2B2C3A;
    --coral: #FF6B4A;
    --coral-dim: #B0492F;
    --mint: #4ADE9C;
    --text: #F2EFE9;
    --text-dim: #8B92A6;
    --text-faint: #5A5F70;
    --border: rgba(242,239,233,0.08);
    --border-strong: rgba(242,239,233,0.16);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--bg);
    position:relative;
    display:flex;
    flex-direction:column;
  }

  @media (min-width: 900px){
    .app{ max-width:1280px; }
  }

  /* ---------- HEADER ---------- */
  .topbar{
    position:sticky;
    top:0;
    z-index:50;
    background:var(--bg);
    padding:18px 20px 12px;
    border-bottom:1px solid var(--border);
  }
  .brand-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .brand{
    font-family:'Archivo Expanded',sans-serif;
    font-weight:700;
    font-size:21px;
    letter-spacing:-0.01em;
    color:var(--text);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .brand .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--coral);
    box-shadow:0 0 0 3px rgba(255,107,74,0.18);
    animation:pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 3px rgba(255,107,74,0.18);}
    50%{box-shadow:0 0 0 6px rgba(255,107,74,0.06);}
  }
  .loc-tag{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:0.04em;
  }

  .view-toggle{
    display:flex;
    background:var(--bg-elevated);
    border-radius:10px;
    padding:3px;
    gap:2px;
  }
  .view-toggle button{
    flex:1;
    border:none;
    background:transparent;
    color:var(--text-dim);
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    padding:9px 0;
    border-radius:8px;
    cursor:pointer;
    transition:all 0.15s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }
  .view-toggle button.active{
    background:var(--coral);
    color:#241208;
  }

  @media (min-width: 900px){
    .topbar{ padding:22px 32px 14px; }
    .view-toggle{ display:none; }
    .filters{ padding:12px 32px 16px; }
  }

  /* ---------- FILTERS ---------- */
  .filters{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:12px 20px 14px;
    scrollbar-width:none;
  }
  .filters::-webkit-scrollbar{display:none;}
  .filter-chip{
    flex-shrink:0;
    padding:7px 14px;
    border-radius:20px;
    border:1px solid var(--border-strong);
    background:transparent;
    color:var(--text-dim);
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    white-space:nowrap;
    transition:all 0.15s ease;
  }
  .filter-chip.active{
    background:var(--text);
    color:var(--bg);
    border-color:var(--text);
  }
  .filter-chip-today{
    display:flex;
    align-items:center;
    gap:5px;
    margin-right:6px;
  }
  .filter-chip-today i{font-size:14px;}
  .filter-chip-today.active{
    background:var(--coral);
    color:#241208;
    border-color:var(--coral);
  }

  /* ---------- MAIN ---------- */
  .main{flex:1; position:relative;}

  #map{
    width:100%;
    height:380px;
    background:#15161D;
    position:relative;
    z-index:1;
  }
  .leaflet-container{
    background:#15161D;
    font-family:'Inter',sans-serif;
  }
  .leaflet-popup-content-wrapper{
    background:var(--bg-card);
    color:var(--text);
    border-radius:12px;
  }
  .leaflet-popup-tip{background:var(--bg-card);}
  .leaflet-popup-content{margin:12px 14px; font-size:13px;}
  .leaflet-control-zoom a{
    background:var(--bg-elevated) !important;
    color:var(--text) !important;
    border-color:var(--border) !important;
  }
  .leaflet-control-attribution{
    background:rgba(26,27,35,0.8) !important;
    color:var(--text-faint) !important;
  }
  .leaflet-control-attribution a{color:var(--text-dim) !important;}

  .pin{
    width:34px;height:34px;
    background:var(--coral);
    border-radius:50% 50% 50% 0;
    transform:rotate(-45deg);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.4);
    border:2px solid #1A1B23;
  }
  .pin i{transform:rotate(45deg); color:#241208; font-size:15px;}
  .pin.confirmado{background:var(--mint);}
  .pin.pin-hover{
    transform:rotate(-45deg) scale(1.25);
    box-shadow:0 4px 14px rgba(0,0,0,0.55), 0 0 0 4px rgba(255,107,74,0.3);
    z-index:1000;
  }

  .popup-cat{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--coral);
    margin-bottom:3px;
    display:block;
  }
  .popup-title{font-weight:600; font-size:14px; margin-bottom:4px;}
  .popup-meta{color:var(--text-dim); font-size:12px;}
  .popup-link{
    display:inline-block;margin-top:8px;
    color:var(--mint); font-size:12px; font-weight:600;
    cursor:pointer; text-decoration:none;
  }

  /* ---------- LIST VIEW ---------- */
  .list-view{
    padding:4px 20px 100px;
  }
  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--text-dim);
  }
  .empty-state i{font-size:32px; color:var(--text-faint); margin-bottom:12px; display:block;}
  .empty-state p{font-size:14px; margin:0 0 4px;}
  .empty-state .sub{font-size:13px; color:var(--text-faint);}

  .ticket{
    position:relative;
    background:var(--bg-card);
    border-radius:14px;
    margin-bottom:14px;
    overflow:hidden;
    border:1px solid var(--border);
    cursor:pointer;
    transition:border-color 0.15s ease;
  }
  .ticket:hover{border-color:var(--border-strong);}
  .ticket:active{transform:scale(0.99);}
  .ticket.ticket-flash{
    border-color:var(--coral);
    animation:ticketFlash 0.9s ease;
  }
  @keyframes ticketFlash{
    0%{ background:var(--bg-card); }
    30%{ background:var(--coral-dim); }
    100%{ background:var(--bg-card); }
  }
  .ticket-img{
    width:100%;
    height:120px;
    object-fit:cover;
    display:block;
    background:var(--bg-elevated);
  }
  .ticket-body{
    padding:14px 16px 16px;
    position:relative;
  }
  /* perforated edge */
  .ticket-body::before{
    content:'';
    position:absolute;
    top:-1px; left:0; right:0;
    height:1px;
    background-image:radial-gradient(circle, var(--bg) 2px, transparent 2.5px);
    background-size:14px 1px;
    background-repeat:repeat-x;
  }
  .ticket-top-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:6px;
  }
  .ticket-cat{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--coral);
  }
  .ticket-price{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--mint);
    font-weight:500;
    white-space:nowrap;
  }
  .ticket-title{
    font-family:'Archivo Expanded',sans-serif;
    font-weight:600;
    font-size:17px;
    line-height:1.2;
    margin:0 0 8px;
    color:var(--text);
  }
  .ticket-meta-row{
    display:flex;
    align-items:center;
    gap:14px;
    color:var(--text-dim);
    font-size:12px;
  }
  .ticket-meta-row span{display:flex; align-items:center; gap:4px;}
  .ticket-meta-row i{font-size:14px;}
  .ticket-dist{
    font-family:'JetBrains Mono',monospace;
    margin-left:auto;
    color:var(--text);
    background:var(--bg-elevated);
    padding:2px 8px;
    border-radius:6px;
    font-size:11px;
  }

  /* ---------- FAB ---------- */
  .fab{
    position:absolute;
    bottom:24px;
    right:20px;
    width:54px;height:54px;
    border-radius:50%;
    background:var(--coral);
    border:none;
    color:#241208;
    font-size:24px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow:0 4px 16px rgba(255,107,74,0.4);
    z-index:40;
  }
  .fab:active{transform:scale(0.94);}

  @media (min-width: 900px){
    .main{
      display:grid;
      grid-template-columns:minmax(420px, 1fr) minmax(480px, 1.1fr);
      align-items:start;
      position:relative;
    }
    #mapWrap{
      display:block !important;
      position:sticky;
      top:0;
      height:100vh;
      grid-column:2;
      grid-row:1;
    }
    #map{ height:100vh; }
    .list-view{
      display:block !important;
      grid-column:1;
      grid-row:1;
      padding:16px 24px 100px 32px;
      max-height:100vh;
      overflow-y:auto;
      position:relative;
    }
    .filters{ grid-column:1 / -1; }
    .fab{
      position:sticky;
      grid-column:1;
      grid-row:1;
      align-self:end;
      justify-self:end;
      margin:0 24px 24px 0;
    }
    .ticket-img{ height:160px; }
  }

  @media (min-width: 1280px){
    #mapWrap{ grid-column:2; }
  }

  /* ---------- SHEET / MODAL ---------- */
  .sheet-overlay{
    position:fixed;
    inset:0;
    background:rgba(10,10,14,0.7);
    z-index:1000;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.2s ease;
  }
  .sheet-overlay.open{opacity:1; pointer-events:auto;}
  .sheet{
    background:var(--bg-elevated);
    width:100%;
    max-width:480px;
    max-height:88vh;
    border-radius:20px 20px 0 0;
    padding:8px 20px 24px;
    overflow-y:auto;
    transform:translateY(100%);
    transition:transform 0.25s cubic-bezier(.2,.8,.2,1);
  }
  .sheet-overlay.open .sheet{transform:translateY(0);}
  .sheet-handle{
    width:36px;height:4px;
    background:var(--border-strong);
    border-radius:4px;
    margin:8px auto 16px;
  }
  .sheet-close{
    position:absolute;
    top:16px; right:16px;
    background:var(--bg-card);
    border:none;
    color:var(--text-dim);
    width:32px;height:32px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    font-size:16px;
    z-index:5;
  }

  .detail-img{
    width:100%; height:180px;
    object-fit:cover;
    border-radius:14px;
    margin-bottom:16px;
    background:var(--bg-card);
  }
  .detail-cat{
    font-family:'JetBrains Mono',monospace;
    font-size:11px; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--coral); margin-bottom:6px; display:block;
  }
  .detail-title{
    font-family:'Archivo Expanded',sans-serif;
    font-weight:700; font-size:23px; line-height:1.15;
    margin:0 0 14px;
  }
  .detail-info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:18px;
  }
  .info-box{
    background:var(--bg-card);
    border-radius:10px;
    padding:10px 12px;
  }
  .info-box .label{
    font-size:10px; text-transform:uppercase; letter-spacing:0.05em;
    color:var(--text-faint); margin-bottom:3px;
  }
  .info-box .value{
    font-size:14px; font-weight:600; color:var(--text);
    font-family:'JetBrains Mono',monospace;
  }
  .detail-desc{
    font-size:14px; line-height:1.6; color:var(--text-dim);
    margin-bottom:20px;
  }
  .detail-organizer{
    display:flex; align-items:center; gap:10px;
    background:var(--bg-card);
    border-radius:12px;
    padding:12px 14px;
    margin-bottom:20px;
  }
  .org-avatar{
    width:36px;height:36px;border-radius:50%;
    background:var(--coral-dim);
    display:flex;align-items:center;justify-content:center;
    font-weight:700; font-size:13px; color:#FFD8C9;
    flex-shrink:0;
  }
  .org-label{font-size:11px; color:var(--text-faint);}
  .org-name{font-size:14px; font-weight:600;}

  .action-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:10px;
  }
  .action-btn{
    border:1px solid var(--border-strong);
    background:transparent;
    color:var(--text);
    padding:13px;
    border-radius:12px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;
    transition:all 0.15s ease;
  }
  .action-btn.primary{background:var(--coral); color:#241208; border-color:var(--coral);}
  .action-btn.active-mint{background:var(--mint); color:#0A2818; border-color:var(--mint);}
  .action-btn.active-coral{background:var(--coral); color:#241208; border-color:var(--coral);}
  .secondary-row{display:flex; gap:10px;}
  .secondary-row .action-btn{font-size:13px; padding:11px;}

  /* ---------- FORM (Add event) ---------- */
  .form-title{
    font-family:'Archivo Expanded',sans-serif;
    font-weight:700; font-size:21px;
    margin:0 0 4px;
  }
  .form-sub{font-size:13px; color:var(--text-dim); margin:0 0 20px;}
  .field{margin-bottom:14px;}
  .field label{
    display:block; font-size:12px; font-weight:600;
    color:var(--text-dim); margin-bottom:6px;
    text-transform:uppercase; letter-spacing:0.03em;
  }
  .field input, .field select, .field textarea{
    width:100%;
    background:var(--bg-card);
    border:1px solid var(--border-strong);
    color:var(--text);
    padding:11px 12px;
    border-radius:10px;
    font-size:14px;
    font-family:'Inter',sans-serif;
  }
  .field textarea{resize:vertical; min-height:70px;}
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none; border-color:var(--coral);
  }
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .submit-btn{
    width:100%;
    background:var(--coral);
    border:none;
    color:#241208;
    padding:15px;
    border-radius:12px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    margin-top:8px;
  }
  .submit-btn:active{transform:scale(0.98);}
  .form-note{
    font-size:12px; color:var(--text-faint);
    text-align:center; margin-top:12px; line-height:1.5;
  }

  .geocode-status{
    font-size:12px;
    margin-top:6px;
    min-height:16px;
    display:flex;
    align-items:center;
    gap:5px;
  }
  .geocode-status.searching{color:var(--text-dim);}
  .geocode-status.found{color:var(--mint);}
  .geocode-status.notfound{color:var(--coral);}
  .geocode-status i{font-size:13px;}
  .geocode-status .spin{animation:spin 0.8s linear infinite;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

  #formMap{
    width:100%;
    height:200px;
    border-radius:10px;
    overflow:hidden;
    border:1px solid var(--border-strong);
  }
  .map-hint{
    font-size:12px;
    color:var(--text-faint);
    margin-top:6px;
    display:flex;
    align-items:center;
    gap:5px;
  }
  .map-hint i{font-size:14px; color:var(--text-dim);}

  .toast{
    position:absolute;
    bottom:24px; left:20px; right:20px;
    background:var(--mint);
    color:#0A2818;
    padding:13px 16px;
    border-radius:12px;
    font-size:14px;
    font-weight:600;
    text-align:center;
    z-index:200;
    opacity:0;
    transform:translateY(10px);
    transition:all 0.25s ease;
    pointer-events:none;
  }
  .toast.show{opacity:1; transform:translateY(0);}

  .loc-banner{
    position:absolute;
    top:12px; left:12px; right:12px;
    background:var(--bg-card);
    border:1px solid var(--border-strong);
    border-radius:10px;
    padding:10px 12px;
    font-size:12px;
    color:var(--text-dim);
    z-index:30;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .loc-banner i{color:var(--coral); font-size:15px;}
  .loc-banner button{
    margin-left:auto;
    background:transparent;
    border:none;
    color:var(--text-faint);
    cursor:pointer;
    font-size:13px;
  }
</style>
</head>
<body>

<div class="app">

  <div class="topbar">
    <div class="brand-row">
      <div class="brand"><span class="dot"></span>Radar de Planes</div>
      <div class="loc-tag" id="locTag">Buenos Aires</div>
    </div>
    <div class="view-toggle">
      <button type="button" class="active" data-view="mapa" aria-pressed="true"><i class="ti ti-map-2"></i>Mapa</button>
      <button type="button" data-view="lista" aria-pressed="false"><i class="ti ti-list"></i>Lista</button>
    </div>
  </div>

  <div class="filters" id="filters"></div>

  <div class="main">
    <div id="mapWrap" style="position:relative;">
      <div id="map"></div>
    </div>
    <div class="list-view" id="listView" style="display:none;"></div>

    <button type="button" class="fab" id="addBtn" aria-label="Agregar actividad"><i class="ti ti-plus"></i></button>
    <div class="toast" id="toast"></div>
  </div>

</div>

<div class="sheet-overlay" id="detailOverlay">
  <div class="sheet" id="detailSheet"></div>
</div>

<div class="sheet-overlay" id="formOverlay">
  <div class="sheet" id="formSheet"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const CATEGORIES = [
  {id:'cine', label:'Cine', icon:'ti-movie'},
  {id:'teatro', label:'Teatro', icon:'ti-theater'},
  {id:'musica', label:'Música', icon:'ti-music'},
  {id:'expo', label:'Exposiciones', icon:'ti-photo'},
  {id:'feria', label:'Ferias', icon:'ti-tent'},
  {id:'lectura', label:'Lectura', icon:'ti-book'},
  {id:'taller', label:'Talleres', icon:'ti-tool'},
  {id:'charla', label:'Charlas', icon:'ti-microphone-2'},
  {id:'gastro', label:'Gastronomía', icon:'ti-tools-kitchen-2'},
  {id:'juegos', label:'Juegos de mesa', icon:'ti-dice-5'},
  {id:'deporte', label:'Deportes', icon:'ti-ball-basketball'},
  {id:'social', label:'Sociales', icon:'ti-users'}
];

const BA_CENTER = [-34.6037, -58.3816];

const SEED_EVENTS = [
  {
    id:'seed-1', title:'Cine al aire libre: noche de clásicos', category:'cine',
    lat:-34.5875, lng:-58.4090, date:'2026-06-27', time:'20:30', price:'Gratis',
    desc:'Proyección al aire libre en el Planetario. Traé reposera o manta. Foodtrucks desde las 19hs.',
    address:'Av. Sarmiento s/n, Palermo', organizer:'Cineclub Palermo',
    img:'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=600&q=70'
  },
  {

let userLocation = null;
let map, markersLayer;
let formMap, formMarker;
let activeFilter = 'todos';
let showTodayOnly = true;
let currentView = 'mapa';
let events = [];
let interactions = {};

function uid(){return 'ev-' + Date.now() + '-' + Math.random().toString(36).slice(2,7);}

function haversine(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDist(km){
  if(km < 1) return Math.round(km*1000) + ' m';
  return km.toFixed(1).replace('.0','') + ' km';
}

function todayStr(){
  const d = new Date();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${d.getFullYear()}-${m}-${day}`;
}

function fmtDate(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['dom','lun','mar','mié','jue','vie','sáb'];
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function catInfo(id){
  return CATEGORIES.find(c => c.id === id) || {label:id, icon:'ti-tag'};
}

async function loadData(){
  let stored = null;
  try{
    const res = await window.storage.get('events', true);
    stored = res ? JSON.parse(res.value) : null;
  }catch(e){ stored = null; }

  if(stored && Array.isArray(stored) && stored.length){
    events = stored;
  }else{
    events = SEED_EVENTS;
    try{ await window.storage.set('events', JSON.stringify(events), true); }catch(e){}
  }

  try{
    const res = await window.storage.get('interactions', false);
    interactions = res ? JSON.parse(res.value) : {};
  }catch(e){ interactions = {}; }
}

async function saveEvents(){
  try{ await window.storage.set('events', JSON.stringify(events), true); }catch(e){}
}
async function saveInteractions(){
  try{ await window.storage.set('interactions', JSON.stringify(interactions), false); }catch(e){}
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function buildFilters(){
  const wrap = document.getElementById('filters');
  const chips = [{id:'todos', label:'Todos'}, ...CATEGORIES];
  const todayChip = `<button type="button" class="filter-chip filter-chip-today${showTodayOnly?' active':''}" id="todayToggle" aria-pressed="${showTodayOnly}"><i class="ti ti-calendar-event"></i>Hoy</button>`;
  wrap.innerHTML = todayChip + chips.map(c =>
    `<button type="button" class="filter-chip${c.id===activeFilter?' active':''}" data-filter="${c.id}" aria-pressed="${c.id===activeFilter}">${c.label}</button>`
  ).join('');
  document.getElementById('todayToggle').addEventListener('click', () => {
    showTodayOnly = !showTodayOnly;
    buildFilters();
    render();
  });
  wrap.querySelectorAll('.filter-chip[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.filter;
      buildFilters();
      render();
    });
  });
}

function getFilteredEvents(){
  let list = activeFilter === 'todos' ? events.slice() : events.filter(e => e.category === activeFilter);
  if(showTodayOnly){
    const today = todayStr();
    list = list.filter(e => e.date === today);
  }
  list = list.map(e => {
    const dist = userLocation ? haversine(userLocation.lat, userLocation.lng, e.lat, e.lng) : null;
    return {...e, _dist: dist};
  });
  list.sort((a,b) => {
    if(a._dist == null) return 0;
    return a._dist - b._dist;
  });
  return list;
}

function initMap(){
  map = L.map('map', {zoomControl:true, attributionControl:true}).setView(BA_CENTER, 13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    maxZoom: 19
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
}

let markerById = {};

function renderMap(){
  markersLayer.clearLayers();
  markerById = {};
  const list = getFilteredEvents();
  list.forEach(ev => {
    const interacted = interactions[ev.id];
    const icon = L.divIcon({
      className: '',
      html: `<div class="pin${interacted==='voy'?' confirmado':''}" id="pin-${ev.id}"><i class="ti ${catInfo(ev.category).icon}"></i></div>`,
      iconSize: [34,34],
      iconAnchor: [17,30]
    });
    const marker = L.marker([ev.lat, ev.lng], {icon}).addTo(markersLayer);
    markerById[ev.id] = marker;
    const distTxt = ev._dist != null ? fmtDist(ev._dist) : '';
    marker.bindPopup(`
      <span class="popup-cat">${catInfo(ev.category).label}</span>
      <div class="popup-title">${escapeHtml(ev.title)}</div>
      <div class="popup-meta">${fmtDate(ev.date)} · ${ev.time}${distTxt ? ' · ' + distTxt : ''}</div>
      <a class="popup-link" data-open-detail="${ev.id}">Ver detalle →</a>
    `);
    marker.on('popupopen', () => {
      const link = document.querySelector(`[data-open-detail="${ev.id}"]`);
      if(link) link.addEventListener('click', () => openDetail(ev.id));
    });
    marker.on('click', () => highlightTicket(ev.id));
  });

  if(userLocation){
    const userIcon = L.divIcon({
      className: '',
      html: `<div style="width:16px;height:16px;border-radius:50%;background:#4ADE9C;border:3px solid #1A1B23;box-shadow:0 0 0 4px rgba(74,222,156,0.25);"></div>`,
      iconSize:[16,16], iconAnchor:[8,8]
    });
    L.marker([userLocation.lat, userLocation.lng], {icon: userIcon, zIndexOffset: 1000}).addTo(markersLayer);
  }
}

function highlightPin(id, on){
  const el = document.getElementById('pin-' + id);
  if(el) el.classList.toggle('pin-hover', on);
}

function highlightTicket(id){
  if(!isDesktop()) return;
  const card = document.querySelector(`.ticket[data-id="${id}"]`);
  if(card){
    card.scrollIntoView({behavior:'smooth', block:'center'});
    card.classList.add('ticket-flash');
    setTimeout(() => card.classList.remove('ticket-flash'), 900);
  }
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderList(){
  const wrap = document.getElementById('listView');
  const list = getFilteredEvents();

  if(list.length === 0){
    const msg = showTodayOnly ? 'No hay planes para hoy en esta categoría' : 'No hay planes en esta categoría todavía';
    const sub = showTodayOnly ? 'Tocá "Hoy" para ver todas las fechas' : 'Probá otro filtro o agregá el primero';
    wrap.innerHTML = `
      <div class="empty-state">
        <i class="ti ti-map-pin-off"></i>
        <p>${msg}</p>
        <div class="sub">${sub}</div>
      </div>`;
    return;
  }

  wrap.innerHTML = list.map(ev => {
    const distTxt = ev._dist != null ? fmtDist(ev._dist) : '—';
    return `
    <div class="ticket" data-id="${ev.id}" role="button" tabindex="0" aria-label="Ver detalle de ${escapeHtml(ev.title)}">
      <img class="ticket-img" src="${ev.img}" alt="${escapeHtml(ev.title)}" loading="lazy" onerror="this.style.display='none'">
      <div class="ticket-body">
        <div class="ticket-top-row">
          <span class="ticket-cat">${catInfo(ev.category).label}</span>
          <span class="ticket-price">${escapeHtml(ev.price)}</span>
        </div>
        <h3 class="ticket-title">${escapeHtml(ev.title)}</h3>
        <div class="ticket-meta-row">
          <span><i class="ti ti-calendar"></i>${fmtDate(ev.date)}</span>
          <span><i class="ti ti-clock"></i>${ev.time}</span>
          <span class="ticket-dist">${distTxt}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  wrap.querySelectorAll('.ticket').forEach(card => {
    card.addEventListener('click', () => openDetail(card.dataset.id));
    card.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        openDetail(card.dataset.id);
      }
    });
    card.addEventListener('mouseenter', () => highlightPin(card.dataset.id, true));
    card.addEventListener('mouseleave', () => highlightPin(card.dataset.id, false));
  });
}

function isDesktop(){
  return window.innerWidth >= 900;
}

function render(){
  if(isDesktop()){
    renderMap();
    renderList();
  }else if(currentView === 'mapa'){
    renderMap();
  }else{
    renderList();
  }
}

  sheet.innerHTML = `

    <div class="sheet-handle"></div>
    <img class="detail-img" src="${ev.img}" alt="${escapeHtml(ev.title)}" onerror="this.style.display='none'">

      <button type="button" class="action-btn ${interacted==='interesa'?'active-coral':''}" id="btnInteresa">
        <i class="ti ti-star"></i>Me interesa
      </button>
      <button type="button" class="action-btn ${interacted==='voy'?'active-mint':''}" id="btnVoy">
        <i class="ti ti-check"></i>Voy
      </button>

      <button type="button" class="action-btn" id="btnComoLlegar"><i class="ti ti-route"></i>Cómo llegar</button>
      <button type="button" class="action-btn" id="btnCompartir"><i class="ti ti-share-2"></i>Compartir</button>
      <button type="button" class="action-btn" id="btnReportar" style="flex:0 0 44px;"><i class="ti ti-flag"></i></button>
    </div>

  document.getElementById('btnInteresa').onclick = () => toggleInteraction(ev.id, 'interesa');
  document.getElementById('btnVoy').onclick = () => toggleInteraction(ev.id, 'voy');
  document.getElementById('btnComoLlegar').onclick = () => {
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${ev.lat},${ev.lng}`, '_blank', 'noopener,noreferrer');

  document.getElementById('btnCompartir').onclick = () => {
    const text = `${ev.title} — ${fmtDate(ev.date)} ${ev.time} en ${ev.address}`;
    if(navigator.share){
      navigator.share({title: ev.title, text}).catch(()=>{});
    }else{
      navigator.clipboard?.writeText(text);
      showToast('Copiado al portapapeles');
    }
  };
  document.getElementById('btnReportar').onclick = () => {
    showToast('Gracias, vamos a revisar este plan');
  };

  document.getElementById('detailOverlay').classList.add('open');

function toggleInteraction(id, type){
  if(interactions[id] === type){
    delete interactions[id];
  }else{
    interactions[id] = type;
  }
  saveInteractions();
  openDetail(id);
  render();
}

function initFormMap(){

  formMap = L.map('formMap', {zoomControl:true, attributionControl:false}).setView([startLat, startLng], 14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(formMap);

  const dragIcon = L.divIcon({
    className: '',
    html: `<div class="pin"><i class="ti ti-grip-vertical"></i></div>`,
    iconSize: [34,34],
    iconAnchor: [17,30]
  });

  formMarker = L.marker([startLat, startLng], {icon: dragIcon, draggable: true}).addTo(formMap);

  formMap.on('click', (e) => {
    formMarker.setLatLng(e.latlng);
  });

  setTimeout(() => formMap.invalidateSize(), 100);
}

function bindAddressGeocoding(){
  const input = document.getElementById('f-address');
  const status = document.getElementById('geocodeStatus');
  let debounceTimer = null;

  input.addEventListener('blur', () => attemptGeocode());
  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ e.preventDefault(); attemptGeocode(); }
  });

  async function attemptGeocode(){
    const query = input.value.trim();
    if(!query || query.length < 4) return;

    status.className = 'geocode-status searching';
    status.innerHTML = `<i class="ti ti-loader-2 spin"></i>Buscando dirección...`;

    try{
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query + ', Buenos Aires, Argentina')}`;
      const res = await fetch(url, {headers: {'Accept-Language': 'es'}});
      const data = await res.json();

      if(data && data.length > 0){
        const lat = parseFloat(data[0].lat);
        const lng = parseFloat(data[0].lon);
        formMarker.setLatLng([lat, lng]);
        formMap.setView([lat, lng], 16);
        status.className = 'geocode-status found';
        status.innerHTML = `<i class="ti ti-map-pin-check"></i>Ubicación encontrada, ajustá el pin si no es exacta`;
      }else{
        status.className = 'geocode-status notfound';
        status.innerHTML = `<i class="ti ti-map-pin-off"></i>No encontramos esa dirección, ubicá el pin a mano`;
      }
    }catch(e){
      status.className = 'geocode-status notfound';
      status.innerHTML = `<i class="ti ti-wifi-off"></i>No se pudo buscar, ubicá el pin a mano`;
    }
  }
}

function isValidImageUrl(url){
  return /^https?:\/\//i.test(url);
}

function handleSubmit(e){
  e.preventDefault();

  const dateVal = document.getElementById('f-date').value;
  if(dateVal < todayStr()){
    showToast('La fecha no puede ser anterior a hoy');
    return;
  }

  const pinPos = formMarker.getLatLng();
  const imgInput = document.getElementById('f-img').value.trim();
  const img = imgInput && isValidImageUrl(imgInput) ? imgInput : 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=600&q=70';

  const newEvent = {
    id: uid(),
    title: document.getElementById('f-title').value.trim(),
    category: document.getElementById('f-category').value,
    price: document.getElementById('f-price').value.trim(),
    date: dateVal,
    time: document.getElementById('f-time').value,
    address: document.getElementById('f-address').value.trim(),
    organizer: document.getElementById('f-organizer').value.trim(),
    desc: document.getElementById('f-desc').value.trim(),
    img,
    lat: pinPos.lat,
    lng: pinPos.lng
  };

  events.unshift(newEvent);
  saveEvents();
  closeForm();
  render();
  showToast('¡Plan publicado!');
}

function setView(view){
  currentView = view;
  document.querySelectorAll('.view-toggle button').forEach(b => {
    const active = b.dataset.view === view;
    b.classList.toggle('active', active);
    b.setAttribute('aria-pressed', active);
  });
  if(!isDesktop()){
    document.getElementById('mapWrap').style.display = view === 'mapa' ? 'block' : 'none';
    document.getElementById('listView').style.display = view === 'lista' ? 'block' : 'none';
  }
  render();
  if(view === 'mapa' || isDesktop()){
    setTimeout(() => map.invalidateSize(), 50);
  }
}

function requestLocation(){
  if(!navigator.geolocation){
    document.getElementById('locTag').textContent = 'Buenos Aires';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLocation = {lat: pos.coords.latitude, lng: pos.coords.longitude};
      document.getElementById('locTag').textContent = 'Cerca de tu ubicación';
      if(map){
        map.setView([userLocation.lat, userLocation.lng], 14);
      }
      render();
    },
    () => {
      document.getElementById('locTag').textContent = 'Buenos Aires';
    },
    {timeout: 6000}
  );
}

async function init(){
  await loadData();
  buildFilters();
  initMap();
  render();
  requestLocation();

  document.querySelectorAll('.view-toggle button').forEach(btn => {
    btn.addEventListener('click', () => setView(btn.dataset.view));
  });
  document.getElementById('addBtn').addEventListener('click', openForm);
  document.getElementById('detailOverlay').addEventListener('click', (e) => {
    if(e.target.id === 'detailOverlay') closeDetail();
  });
  document.getElementById('formOverlay').addEventListener('click', (e) => {
    if(e.target.id === 'formOverlay') closeForm();
  });

  let lastIsDesktop = isDesktop();
  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const nowDesktop = isDesktop();
      if(nowDesktop !== lastIsDesktop){
        lastIsDesktop = nowDesktop;
        setView(currentView);
      }
      if(map) map.invalidateSize();
    }, 150);
  });
}

init();
</script>
</body>
</html>
